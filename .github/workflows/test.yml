name: provider-test
on:
  push: { paths: ['ai-aisia-lab/infra/terraform-provider-aisia/**'] }
  pull_request: { paths: ['ai-aisia-lab/infra/terraform-provider-aisia/**'] }
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: ai-aisia-lab/infra/terraform-provider-aisia } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go mod tidy
      - run: gofmt -s -w .          # auto-format (scaffold initial)
      - run: go vet ./...
      - run: go build ./...
