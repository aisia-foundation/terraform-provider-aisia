name: provider-test
on:
  push: { paths: ['**.go', 'go.mod', 'go.sum'] }
  pull_request: { paths: ['**.go', 'go.mod', 'go.sum'] }
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: . } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go mod tidy
      - run: gofmt -s -w .          # auto-format (scaffold initial)
      - run: go vet ./...
      - run: go build ./...
