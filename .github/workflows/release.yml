name: provider-release
# Build + signe GPG + GitHub Release PUIS enregistre la version sur le registry HCP
# privé via l'API (provider privé ≠ modules : pas de VCS auto-ingest). Repo public → Actions gratuit.
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: . } }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - uses: goreleaser/goreleaser-action@v6
        with: { version: '~> v2', args: 'release --clean' }
        env:
          GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # --- Publication HCP (provider privé = API). Skip propre si TF_API_TOKEN absent. ---
      - name: Publish version to HCP private registry
        env:
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"   # vX.Y.Z -> X.Y.Z
          chmod +x scripts/publish-hcp.sh
          ./scripts/publish-hcp.sh
